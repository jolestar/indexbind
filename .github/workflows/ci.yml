name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: TypeScript and cargo check
        run: npm run check

      - name: Rust tests
        run: cargo test --workspace

      - name: Build package
        run: npm run build

      - name: Web bundle smoke test
        run: npm run smoke:web-bundle

      - name: Benchmark fixture
        run: npm run benchmark:basic

      - name: Release manifest verification
        run: npm run release:verify
