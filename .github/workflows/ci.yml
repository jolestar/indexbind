name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      full_validate: ${{ steps.classify.outputs.full_validate }}
      docs_validate: ${{ steps.classify.outputs.docs_validate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changes
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
            echo "full_validate=true" >> "$GITHUB_OUTPUT"
            echo "docs_validate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"

          if [[ -z "${changed_files}" ]]; then
            echo "full_validate=true" >> "$GITHUB_OUTPUT"
            echo "docs_validate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue
            case "${file}" in
              docs/*|README.md|CHANGELOG.md|skills/*|AGENTS.md)
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done <<< "${changed_files}"

          if [[ "${docs_only}" == "true" ]]; then
            echo "full_validate=false" >> "$GITHUB_OUTPUT"
            echo "docs_validate=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_validate=true" >> "$GITHUB_OUTPUT"
            echo "docs_validate=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.full_validate == 'true' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: TypeScript and cargo check
        run: npm run check

      - name: Rust tests
        run: cargo test --workspace

      - name: Build package
        run: npm run build

      - name: CLI smoke test
        run: npm run smoke:cli

      - name: Web bundle smoke test
        run: npm run smoke:web-bundle

      - name: Web worker smoke test
        run: npm run smoke:web-worker

      - name: Web browser smoke test
        run: npm run smoke:web-browser

      - name: Benchmark fixture
        run: npm run benchmark:basic

      - name: Release manifest verification
        run: npm run release:verify

  docs-validate:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docs_validate == 'true' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs search bundle
        run: npm run docs:search
