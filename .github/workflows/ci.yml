name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: TypeScript and cargo check
        run: npm run check

      - name: Rust tests
        run: cargo test --workspace

      - name: Build package
        run: npm run build

      - name: Web bundle smoke test
        run: npm run smoke:web-bundle

      - name: Web worker smoke test
        run: npm run smoke:web-worker

      - name: Web browser smoke test
        run: npm run smoke:web-browser

      - name: Benchmark fixture
        run: npm run benchmark:basic

      - name: Release manifest verification
        run: npm run release:verify
